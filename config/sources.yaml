sources:
  # ---------- DIFC ----------
  - name: DFSA News
    jurisdiction: DIFC
    regulator: DFSA
    url: https://www.dfsa.ae/news
    link_patterns: ["/news/"]

  - name: DFSA Consultations
    jurisdiction: DIFC
    regulator: DFSA
    url: https://www.dfsa.ae/your-resources/regulatory/consultation-papers
    link_patterns: ["consultation"]

  - name: DIFC / DFSA press backstop (Google News)
    jurisdiction: DIFC
    regulator: DFSA / DIFC
    type: rss
    url: https://news.google.com/rss/search?q=%22Dubai+Financial+Services+Authority%22+OR+%22DIFC%22&hl=en-AE&gl=AE&ceid=AE:en

  # ---------- ADGM ----------
  - name: ADGM Announcements (incl. FSRA)
    jurisdiction: ADGM
    regulator: ADGM / FSRA
    url: https://www.adgm.com/media/announcements
    link_patterns: ["/media/announcements/"]

  - name: ADGM Public Consultations
    jurisdiction: ADGM
    regulator: ADGM / FSRA
    url: https://www.adgm.com/legal-framework/public-consultations
    link_patterns: ["consultation"]

  - name: ADGM / FSRA press backstop (Google News)
    jurisdiction: ADGM
    regulator: FSRA / ADGM
    type: rss
    url: https://news.google.com/rss/search?q=%22Abu+Dhabi+Global+Market%22+OR+%22ADGM+FSRA%22&hl=en-AE&gl=AE&ceid=AE:en

  # ---------- ONSHORE ----------
  - name: CBUAE Rulebook Updates
    jurisdiction: ONSHORE
    regulator: CBUAE
    url: https://rulebook.centralbank.ae/en/view-revision-updates
    link_patterns: ["/rulebook/"]

  - name: CBUAE press backstop (Google News)
    jurisdiction: ONSHORE
    regulator: CBUAE
    type: rss
    url: https://news.google.com/rss/search?q=%22Central+Bank+of+the+UAE%22+OR+CBUAE&hl=en-AE&gl=AE&ceid=AE:en

  - name: SCA News
    jurisdiction: ONSHORE
    regulator: SCA
    url: https://www.sca.gov.ae/en/media-center/news.aspx
    link_patterns: ["/media-center/", "/news"]

  - name: VARA News
    jurisdiction: ONSHORE
    regulator: VARA
    url: https://www.vara.ae/en/news/
    link_patterns: ["/news/"]

  - name: VARA Regulatory Notices
    jurisdiction: ONSHORE
    regulator: VARA
    url: https://www.vara.ae/en/regulations/regulatory-notices/
    link_patterns: ["/regulatory-notices/"]

