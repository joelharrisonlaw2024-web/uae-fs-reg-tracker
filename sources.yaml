name: Weekly email digest

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC = 08:00 UAE (GST, UTC+4)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tracker-data
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optional
        run: python src/digest.py

      - name: Commit digest snapshot
        run: |
          git config user.name "reg-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/last_digest.html
          git diff --cached --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d')"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
